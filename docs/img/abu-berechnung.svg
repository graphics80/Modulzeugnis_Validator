<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#111827">ABU-Durchschnitt (Allgemeinbildender Unterricht)</text>

  <!-- Semester header -->
  <text x="24" y="78" font-size="13" font-weight="700" fill="#374151">Allgemeinbildender Unterricht</text>
  <text x="640" y="78" font-size="13" font-weight="700" fill="#111827">4.5</text>
  <text x="700" y="78" font-size="11" fill="#6b7280">gedruckt</text>

  <g font-size="12" fill="#9ca3af" text-anchor="middle">
    <text x="300" y="104">HE/23</text><text x="360" y="104">FR/24</text><text x="420" y="104">HE/24</text>
    <text x="480" y="104">FR/25</text><text x="540" y="104">HE/25</text><text x="600" y="104">FR/26</text>
  </g>

  <!-- Sprache row -->
  <text x="24" y="130" font-size="13" fill="#374151">AB23c Sprache und Kommunikation</text>
  <g font-size="13" fill="#111827" text-anchor="middle">
    <text x="300" y="130">5.0</text><text x="360" y="130">4.5</text><text x="420" y="130">5.0</text>
    <text x="480" y="130">4.5</text><text x="540" y="130">4.5</text><text x="600" y="130">4.0</text>
  </g>

  <!-- Gesellschaft row -->
  <text x="24" y="156" font-size="13" fill="#374151">AB23c Gesellschaft</text>
  <g font-size="13" fill="#111827" text-anchor="middle">
    <text x="300" y="156">4.5</text><text x="360" y="156">4.5</text><text x="420" y="156">5.0</text>
    <text x="480" y="156">4.5</text><text x="540" y="156">5.0</text><text x="600" y="156">4.5</text>
  </g>

  <line x1="24" y1="176" x2="736" y2="176" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Note about missing early semesters -->
  <rect x="24" y="192" width="712" height="40" rx="6" fill="#fffbeb" stroke="#fde68a"/>
  <text x="38" y="210" font-size="12" fill="#92400e" font-weight="600">Hinweis:</text>
  <text x="98" y="210" font-size="12" fill="#92400e">Nicht alle Lernenden haben ab dem ersten Semester ABU-Noten</text>
  <text x="38" y="226" font-size="12" fill="#92400e">(Wechsel von der BMS in die ABU-Klasse) â€” es werden nur die vorhandenen Noten gemittelt.</text>

  <!-- Calculation -->
  <text x="24" y="270" font-size="14" font-weight="700" fill="#111827">Berechnung</text>
  <text x="24" y="296" font-size="13" fill="#374151">Alle 12 ABU-Noten aufsummieren:</text>
  <text x="24" y="318" font-size="13" fill="#4b5563" font-family="ui-monospace, monospace">(5.0+4.5+5.0+4.5+4.5+4.0) + (4.5+4.5+5.0+4.5+5.0+4.5) = 55.5</text>

  <text x="24" y="346" font-size="13" fill="#374151">Mittel und auf 0.5 runden:</text>
  <text x="24" y="368" font-size="13" fill="#4b5563" font-family="ui-monospace, monospace">55.5 / 12 = 4.625  â†’  runden auf 0.5  â†’  4.5</text>

  <!-- Result badge -->
  <rect x="560" y="330" width="176" height="46" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="648" y="352" font-size="12" fill="#065f46" text-anchor="middle">berechnet 4.5 = gedruckt 4.5</text>
  <text x="648" y="368" font-size="12" font-weight="700" fill="#047857" text-anchor="middle">âś“ gĂĽltig</text>
</svg>
